version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chopper_pos_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chopper_pos_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: chopper_pos_backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=chopper_pos_dev
      - JWT_ACCESS_SECRET=chopper_pos_access_secret_2026_dev
      - JWT_REFRESH_SECRET=chopper_pos_refresh_secret_2026_dev
      - JWT_ACCESS_EXPIRES_IN=8h
      - JWT_REFRESH_EXPIRES_IN=7d
      - PORT=3000
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: chopper_pos_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
